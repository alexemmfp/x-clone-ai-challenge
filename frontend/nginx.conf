server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /uploads/ {
        proxy_pass http://backend:8080;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
