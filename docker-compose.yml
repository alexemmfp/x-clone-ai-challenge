services:
  postgres:
    image: postgres:17-alpine
    container_name: twitterclone-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-twitter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-dev}
      POSTGRES_DB: ${POSTGRES_DB:-twitterclone}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twitter} -d ${POSTGRES_DB:-twitterclone}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: twitterclone-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-twitterclone};Username=${POSTGRES_USER:-twitter};Password=${POSTGRES_PASSWORD:-change-me-local-dev}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-change-me-in-production-min-32-chars!}"
      Jwt__Issuer: "twitterclone"
      Jwt__Audience: "twitterclone-web"
      Jwt__AccessTokenMinutes: "15"
      Jwt__RefreshTokenDays: "7"
      Bcrypt__WorkFactor: "12"
      Cors__AllowedOrigins__0: "http://localhost"
      Cors__AllowedOrigins__1: "http://localhost:5173"
      Storage__UploadsPath: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    container_name: twitterclone-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
