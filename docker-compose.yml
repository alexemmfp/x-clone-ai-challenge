# Dev infrastructure. Boots Postgres immediately so the backend has a DB.
# Full-stack one-command up (backend + frontend images) is added in M7 (Docker bonus).
services:
  postgres:
    image: postgres:17-alpine
    container_name: twitterclone-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-twitter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-dev}
      POSTGRES_DB: ${POSTGRES_DB:-twitterclone}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twitter} -d ${POSTGRES_DB:-twitterclone}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
